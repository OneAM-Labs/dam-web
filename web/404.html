<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DAM - Page Not Found.">
    <meta name="theme-color" content="#000000">
    <title>404 - DAM</title>

    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #0a0a0a;
            --bg-elevated: #111111;
            --text-primary: #ededed;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --border-subtle: #27272a;
            --border-hover: #3f3f46;
            --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { color: inherit; text-decoration: none; }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 64px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            z-index: 100;
            display: flex; align-items: center;
        }

        .nav-content {
            display: flex; justify-content: space-between; align-items: center; width: 100%;
            max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; flex: 1;
        }

        .brand {
            display: flex; align-items: center; gap: 0.75rem;
            font-weight: 600; letter-spacing: -0.02em; font-size: 1.125rem;
        }

        .brand svg { width: 20px; height: 20px; }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { color: var(--text-secondary); font-size: 0.875rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text-primary); }

        /* Main */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin-top: 64px;
        }

        .content {
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        /* 404 Number */
        .code {
            font-size: 12rem;
            font-weight: 700;
            line-height: 1;
            font-family: var(--font-mono);
            color: var(--text-tertiary);
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
        }

        /* Title */
        .title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
        }

        /* Subtitle */
        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.7;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-base);
            border-color: var(--text-primary);
        }
        .btn-primary:hover {
            background: #d4d4d8;
            border-color: #d4d4d8;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border-color: var(--border-subtle);
        }
        .btn-secondary:hover {
            border-color: var(--border-hover);
            background: var(--bg-surface);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 3rem 0;
        }

        /* Footer links */
        .footer-links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            font-size: 0.875rem;
            color: var(--text-tertiary);
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .code {
                font-size: 6rem;
            }

            .title {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9375rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .footer-links {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="nav-content">
            <a href="/" class="brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 3h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
                    <line x1="6" y1="9" x2="18" y2="9"/>
                </svg>
                DAM
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/#concepts">Concepts</a>
                <a href="/#downloads">Install</a>
            </div>
        </div>
    </div>

    <main>
        <div class="content">
            <div class="code">404</div>
            <h1 class="title">Page not found</h1>
            <p class="subtitle">This reservoir doesn't contain the stream you're looking for. The path may have been redirected or never sealed.</p>

            <div class="btn-group">
                <a href="/" class="btn btn-primary">Back home</a>
                <a href="/#concepts" class="btn btn-secondary">View concepts</a>
            </div>

            <div class="divider"></div>

            <div class="footer-links">
                <a href="/">Home</a>
                <a href="/#downloads">Installation</a>
            </div>
        </div>
    </main>

</body>
</html>
